<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>배경 제거 스튜디오</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <span class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5v-11Z" />
              <path d="M7 16.5 10.2 13l2 2.1L15.8 10 18 16.5H7Z" />
              <circle cx="9" cy="8.5" r="1.4" />
            </svg>
          </span>
          <h1>배경 제거 스튜디오</h1>
        </div>
        <div class="top-actions">
          <a class="source-link" href="https://github.com/chj1027/IBRS" target="_blank" rel="noreferrer">소스코드</a>
          <button id="resetButton" class="ghost-button" type="button" disabled>초기화</button>
          <button id="downloadButton" class="primary-button" type="button" disabled>PNG 다운로드</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="left-panel">
          <label id="dropZone" class="drop-zone" for="fileInput">
            <input id="fileInput" type="file" accept="image/*" />
            <span class="upload-icon">+</span>
            <strong>이미지 업로드</strong>
            <small>PNG, JPG, WEBP 파일을 여기에 놓거나 선택하세요.</small>
          </label>

          <div class="status-box">
            <span id="statusDot" class="status-dot"></span>
            <p id="statusText">이미지를 선택하면 브라우저에서 처리합니다.</p>
          </div>

          <div class="progress-box" aria-label="processing progress">
            <div class="progress-header">
              <span id="progressLabel">대기</span>
              <strong id="progressValue">0%</strong>
            </div>
            <div class="progress-track">
              <span id="progressBar"></span>
            </div>
          </div>

          <div class="info-list">
            <div>
              <span>처리 방식</span>
              <strong id="engineLabel">대기 중</strong>
            </div>
            <div>
              <span>이미지 크기</span>
              <strong id="sizeLabel">-</strong>
            </div>
          </div>
        </aside>

        <section class="preview-panel">
          <div class="preview-toolbar">
            <div class="segmented-control" aria-label="preview mode">
              <button class="active" type="button" data-view="result">결과</button>
              <button type="button" data-view="compare">비교</button>
              <button type="button" data-view="mask">마스크</button>
              <button type="button" data-view="original">원본</button>
            </div>
            <div class="zoom-group">
              <button id="zoomOutButton" type="button" aria-label="축소">-</button>
              <span id="zoomLabel">100%</span>
              <button id="zoomInButton" type="button" aria-label="확대">+</button>
            </div>
          </div>

          <div id="canvasStage" class="canvas-stage checkerboard">
            <canvas id="mainCanvas"></canvas>
            <p id="emptyState">이미지를 업로드하면 미리보기가 표시됩니다.</p>
          </div>
        </section>

        <aside class="right-panel">
          <section class="control-section">
            <h2>처리 품질</h2>
            <label class="field">
              <span>AI 방식 <button class="help-tip" type="button" aria-label="AI 방식 설명">?</button><small class="tip-text">IMG.LY는 제품, 스티커, 로고 등 일반 이미지에 강하고 MediaPipe는 사람 사진에 가볍게 동작합니다.</small></span>
              <select id="aiEngine">
                <option value="imgly">IMG.LY 범용</option>
                <option value="mediapipe">MediaPipe 인물용</option>
              </select>
            </label>
            <label class="field">
              <span>품질 모드 <button class="help-tip" type="button" aria-label="품질 모드 설명">?</button><small class="tip-text">빠름은 속도 우선, 고품질은 더 큰 처리 해상도로 디테일을 살립니다.</small></span>
              <select id="qualityMode">
                <option value="balanced">균형</option>
                <option value="fast">빠름</option>
                <option value="high">고품질</option>
              </select>
            </label>
            <label class="field">
              <span>처리 해상도 <button class="help-tip" type="button" aria-label="처리 해상도 설명">?</button><small class="tip-text">작은 글자, 얇은 선, 머리카락은 1024px 이상이 유리하지만 처리 시간이 늘어납니다.</small></span>
              <select id="processSize">
                <option value="768">768 px</option>
                <option value="512">512 px</option>
                <option value="1024">1024 px</option>
                <option value="original">원본 근접</option>
              </select>
            </label>
            <button id="processButton" class="primary-button full-width" type="button" disabled>배경 제거</button>
          </section>

          <section class="control-section">
            <h2>추천 프리셋</h2>
            <div class="preset-grid">
              <button type="button" data-preset="person">인물</button>
              <button type="button" data-preset="product">제품</button>
              <button type="button" data-preset="sticker">스티커/로고</button>
              <button type="button" data-preset="text">흰 글자/얇은 선</button>
            </div>
            <div class="setting-actions">
              <button id="saveSettingsButton" class="ghost-button compact" type="button">현재 설정 저장</button>
              <button id="loadSettingsButton" class="ghost-button compact" type="button">불러오기</button>
            </div>
          </section>

          <section class="control-section">
            <h2>문제 해결</h2>
            <div class="preset-grid">
              <button type="button" data-fix="detail">글자/얇은 선 살리기</button>
              <button type="button" data-fix="residue">테두리 잔여물 줄이기</button>
              <button type="button" data-fix="hair">머리카락 자연스럽게</button>
              <button id="blackPreviewButton" type="button">검정 배경 확인</button>
            </div>
          </section>

          <section class="control-section">
            <h2>가장자리 조정</h2>
            <label class="range-field">
              <span>마스크 임계값 <button class="help-tip" type="button" aria-label="마스크 임계값 설명">?</button><small class="tip-text">값을 올리면 흐릿한 전경을 더 살립니다. 너무 올리면 배경 찌꺼기도 남을 수 있습니다.</small><b id="thresholdValue">8</b></span>
              <input id="thresholdRange" type="range" min="-80" max="80" value="8" />
            </label>
            <label class="range-field">
              <span>가장자리 부드럽게 <button class="help-tip" type="button" aria-label="가장자리 부드럽게 설명">?</button><small class="tip-text">경계 톱니를 줄입니다. 글자나 얇은 선이 흐려지면 낮추세요.</small><b id="featherValue">3</b></span>
              <input id="featherRange" type="range" min="0" max="12" value="3" />
            </label>
            <label class="range-field">
              <span>가장자리 확장/축소 <button class="help-tip" type="button" aria-label="가장자리 확장 축소 설명">?</button><small class="tip-text">플러스는 전경을 넓히고, 마이너스는 배경 잔여물을 깎습니다.</small><b id="edgeValue">0</b></span>
              <input id="edgeRange" type="range" min="-8" max="8" value="0" />
            </label>
            <label class="range-field">
              <span>색 번짐 제거 <button class="help-tip" type="button" aria-label="색 번짐 제거 설명">?</button><small class="tip-text">흰색, 초록색, 파란색 배경 잔상을 줄입니다. 너무 올리면 원래 색이 탁해질 수 있습니다.</small><b id="spillValue">18</b></span>
              <input id="spillRange" type="range" min="0" max="70" value="18" />
            </label>
          </section>

          <section class="control-section">
            <h2>수동 보정</h2>
            <div class="tool-buttons" aria-label="brush mode">
              <button class="active" type="button" data-brush="erase">지우기</button>
              <button type="button" data-brush="restore">복원</button>
            </div>
            <label class="range-field">
              <span>브러시 크기 <button class="help-tip" type="button" aria-label="브러시 크기 설명">?</button><small class="tip-text">작은 글자와 디테일은 작게, 넓은 영역은 크게 조절하세요.</small><b id="brushSizeValue">36</b></span>
              <input id="brushSizeRange" type="range" min="8" max="140" value="36" />
            </label>
            <label class="range-field">
              <span>브러시 부드러움 <button class="help-tip" type="button" aria-label="브러시 부드러움 설명">?</button><small class="tip-text">낮으면 선명하게 칠하고, 높으면 주변과 자연스럽게 섞입니다.</small><b id="brushSoftnessValue">45</b></span>
              <input id="brushSoftnessRange" type="range" min="0" max="100" value="45" />
            </label>
            <button id="clearBrushButton" class="ghost-button full-width" type="button" disabled>수동 보정 초기화</button>
          </section>

          <section class="control-section">
            <h2>배경 미리보기</h2>
            <div class="swatches">
              <button class="swatch transparent active" type="button" data-bg="transparent" aria-label="투명"></button>
              <button class="swatch white" type="button" data-bg="#ffffff" aria-label="흰색"></button>
              <button class="swatch black" type="button" data-bg="#111111" aria-label="검정"></button>
              <button class="swatch gray" type="button" data-bg="#d6dbe1" aria-label="회색"></button>
              <input id="customBg" type="color" value="#8ecae6" aria-label="사용자 배경색" />
            </div>
          </section>
        </aside>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
